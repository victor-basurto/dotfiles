# ~/.config/starship.toml

format = """
$os\
$directory\
$custom\
$git_branch\
$git_status\
$nodejs\
$lua\
$line_break\
$character"""

[os]
disabled = false
format = "[$symbol ](bold white)"

[os.symbols]
Macos = "´ú┐"

[directory]
style = "bold cyan"
truncation_length = 4
truncation_symbol = "ÔÇª/"

[git_branch]
symbol = "´Éÿ "
style = "bold yellow"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"

[nodejs]
symbol = "¯£ÿ "
style = "bold green"
format = "via [$symbol($version )]($style)"

[lua]
symbol = "¯ÿá "
format = "via [$symbol$version](bold blue) "

[character]
success_symbol = "[Ô×£](bold green) "
error_symbol = "[Ô×£](bold red) "

[custom.sitecore]
detect_files = ["sitecore.json"]
symbol = "¾░¡╗ "
style = "bold red"
format = " [$symbol XMCloud]($style) "

[package]
disabled = true
