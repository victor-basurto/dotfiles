# ===============================
# SHELL CONFIG
# ===============================
set-option -g default-shell "C:/Program Files/PowerShell/7/pwsh.exe"
set-option -g default-command "pwsh -NoLogo"

# ensure consistent env behavior
set-option -g update-environment "PSModulePath PATH"

# ===============================
# PSMUX FLAGS
# ===============================
set -g @psmux_load_tmux_conf 'yes'
set -g @psmux_override_prefix 'yes'

# ===============================
# CORE SETTINGS
# ===============================
set -sg escape-time 0

# prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# reload config
bind r source-file ~/.tmux.conf \; display-message "psmux reloaded!"

# ===============================
# WINDOWS
# ===============================
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind w choose-window

# ===============================
# PANES
# ===============================
set -g mouse on

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind v split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# ===============================
# COPY MODE
# ===============================
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
bind -T copy-mode-vi Y send-keys -X copy-line

# ===============================
# LOOK & FEEL
# ===============================
set -g default-terminal "xterm-256color"
set -as terminal-features ",xterm-256color:RGB"

set -g status-interval 0
set -g status-justify left

set -g status-bg '#333333'
set -g status-fg '#ffffff'

set -g status-left '#[fg=green,bold] #S #[fg=white] #I:#P '
set -g status-right '#[fg=cyan] %Y-%m-%d %H:%M '

setw -g window-status-current-style bg=#4527a0,fg=white,bold
setw -g window-status-style fg=white,bg=default

set -g pane-border-style fg=green
set -g pane-active-border-style fg=blue

# ===============================
# PERFORMANCE
# ===============================
set -g history-limit 10000
set -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'

# IMPORTANT: removed prediction flag (was causing instability)
# set -g allow-predictions on

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
